<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Journal — VN Stocks</title>
<style>
  :root {
    --bg:#0f1117; --bg2:#1a1d27; --bg3:#22263a;
    --border:#2d3148; --accent:#4f8ef7; --accent2:#7c6af7;
    --green:#22c55e; --red:#ef4444; --yellow:#f59e0b;
    --text:#e2e8f0; --muted:#7c849e;
    --font:'Inter',-apple-system,sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; }
  nav { background:var(--bg2); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; padding:0 24px; height:52px; position:sticky; top:0; z-index:100; }
  nav .logo { font-weight:700; font-size:15px; color:var(--accent); margin-right:16px; }
  nav a { color:var(--muted); text-decoration:none; font-size:13px; font-weight:500; padding:6px 12px; border-radius:6px; transition:all .15s; }
  nav a:hover, nav a.active { color:var(--text); background:var(--bg3); }
  nav a.active { color:var(--accent); }
  nav .spacer { flex:1; }

  .layout { display:flex; height:calc(100vh - 52px); }

  /* SIDEBAR */
  .sidebar {
    width:220px; border-right:1px solid var(--border);
    overflow-y:auto; padding:16px 12px;
    flex-shrink:0;
  }
  .sidebar-section { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); padding:8px 8px 6px; }
  .ticker-btn {
    display:flex; align-items:center; gap:10px;
    width:100%; padding:9px 10px; border-radius:7px;
    background:none; border:none; cursor:pointer;
    color:var(--text); text-align:left; transition:background .15s;
    margin-bottom:2px;
  }
  .ticker-btn:hover { background:var(--bg3); }
  .ticker-btn.active { background:rgba(79,142,247,.12); }
  .ticker-btn .tb-code { font-weight:700; font-size:13px; color:var(--accent); min-width:36px; }
  .ticker-btn .tb-info { font-size:11px; color:var(--muted); }
  .ticker-btn .tb-badge { margin-left:auto; font-size:10px; padding:2px 6px; border-radius:10px; font-weight:600; }
  .badge-hold { background:rgba(34,197,94,.12); color:var(--green); }
  .badge-watch { background:rgba(79,142,247,.12); color:var(--accent); }

  /* MAIN */
  .main { flex:1; overflow-y:auto; padding:24px 28px; }
  h2 { font-size:18px; font-weight:700; margin-bottom:4px; }
  .meta { font-size:12px; color:var(--muted); margin-bottom:20px; display:flex; gap:12px; align-items:center; }
  .tag { background:var(--bg3); padding:2px 8px; border-radius:4px; font-size:11px; }

  .section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin:20px 0 10px; display:flex; align-items:center; gap:8px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  .info-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
  .info-card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; }
  .info-card .ic-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px; }
  .info-card .ic-val { font-size:14px; font-weight:700; }

  table { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:20px; }
  th { text-align:left; padding:7px 10px; font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
  td { padding:9px 10px; border-bottom:1px solid var(--border); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--bg3); }

  .rec { font-size:10px; padding:2px 7px; border-radius:10px; font-weight:600; }
  .rec-buy { background:rgba(34,197,94,.15); color:var(--green); }
  .rec-hold { background:rgba(245,158,11,.15); color:var(--yellow); }
  .rec-watch { background:rgba(79,142,247,.15); color:var(--accent); }

  .rsi-bar { display:inline-block; width:44px; height:5px; background:var(--bg3); border-radius:3px; vertical-align:middle; margin-left:4px; overflow:hidden; }
  .rsi-fill { height:100%; border-radius:3px; }

  .thesis-cols { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
  .thesis-block { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:12px 14px; }
  .th-title { font-size:11px; font-weight:700; margin-bottom:8px; }
  .thesis-block li { font-size:12px; color:var(--muted); list-style:none; padding:2px 0; line-height:1.4; }

  .entry-plan { background:var(--bg2); border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:20px; }

  .no-tx { color:var(--muted); font-size:12px; font-style:italic; padding:12px 0; }

  /* EMPTY STATE */
  .empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60%; color:var(--muted); gap:12px; }
  .empty .em-icon { font-size:40px; }
  .empty .em-text { font-size:14px; }
</style>
</head>
<body>
<nav>
  <span class="logo">📈 VN Stocks</span>
  <a href="index.html">Dashboard</a>
  <a href="portfolio.html">Portfolio</a>
  <a href="journal.html" class="active">Journal</a>
  <a href="glossary.html">Glossary</a>
  <div class="spacer"></div>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">🟢 Đang giữ</div>
    <button class="ticker-btn active" onclick="show('VIC')">
      <span class="tb-code">VIC</span>
      <div><div style="font-size:12px;font-weight:600;">Vingroup</div><div class="tb-info">HOSE · BĐS</div></div>
      <span class="tb-badge badge-hold">GIỮ</span>
    </button>
    <button class="ticker-btn" onclick="show('BSR')">
      <span class="tb-code">BSR</span>
      <div><div style="font-size:12px;font-weight:600;">Bình Sơn</div><div class="tb-info">UPCOM · Dầu khí</div></div>
      <span class="tb-badge badge-hold">GIỮ</span>
    </button>

    <div class="sidebar-section" style="margin-top:12px;">👁️ Theo dõi</div>
    <button class="ticker-btn" onclick="show('ACB')">
      <span class="tb-code">ACB</span>
      <div><div style="font-size:12px;font-weight:600;">ACB</div><div class="tb-info">HOSE · Ngân hàng</div></div>
      <span class="tb-badge badge-watch">WATCH</span>
    </button>
    <button class="ticker-btn" onclick="show('VRE')">
      <span class="tb-code">VRE</span>
      <div><div style="font-size:12px;font-weight:600;">Vincom Retail</div><div class="tb-info">HOSE · BĐS</div></div>
      <span class="tb-badge badge-watch">WATCH</span>
    </button>
    <button class="ticker-btn" onclick="show('VTP')">
      <span class="tb-code">VTP</span>
      <div><div style="font-size:12px;font-weight:600;">Viettel Post</div><div class="tb-info">HOSE · Logistics</div></div>
      <span class="tb-badge badge-watch">WATCH</span>
    </button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main" id="main-content">
    <!-- Rendered by JS -->
  </div>
</div>

<script>
let appData = null;

// Normalize journal entry from data.json to the shape show() expects
function normalize(ticker, data) {
  const j = data.journals[ticker] || {};
  const holdings = data.portfolio.holdings || [];
  const h = holdings.find(x => x.ticker === ticker);
  const pos = j.position || {};
  const statusRaw = (pos['Trạng thái'] || pos['Trang thai'] || '').replace(/\s/g,' ');
  const isHolding = statusRaw.includes('GIỮ') || statusRaw.includes('GIU') || !!h;
  const sector = (data.portfolio.watchlist||[]).includes(ticker)
    ? (j.buffett || '').split('—')[0] : '';

  return {
    ticker,
    name:       j.buffett ? j.buffett.split('—')[0].replace(/^[^a-zA-ZÀ-ỹ]*/,'').trim() : ticker,
    exchange:   h ? '' : '',
    sector:     sector.trim(),
    status:     statusRaw || (isHolding ? 'ĐANG GIỮ' : 'THEO DÕI'),
    statusClass: isHolding ? 'badge-hold' : 'badge-watch',
    qty:        h ? parseInt((pos['Số lượng']||'').replace(/\D/g,'')) || h.quantity : null,
    cost:       h ? h.avg_cost : null,
    capital:    h ? h.avg_cost * (parseInt((pos['Số lượng']||'').replace(/\D/g,''))||h.quantity) : null,
    entryDate:  h ? h.entry_date : null,
    sl:         h ? h.stop_loss : null,
    tp:         h ? h.targets : [],
    buffett:    j.buffett || '',
    bull:       j.bull || [],
    bear:       j.bear || [],
    snapshots:  j.snapshots || [],
    trades:     j.trades || [],
    entryPlan:  j.entryPlan || [],
    strategy:   null,
  };
}

function buildSidebar(data) {
  const holdings = (data.portfolio.holdings||[]).map(h=>h.ticker);
  const watchlist = data.portfolio.watchlist||[];
  const nameMap = {};
  for (const t of [...holdings,...watchlist]) {
    const j = data.journals[t]||{};
    const bf = j.buffett || '';
    const m = bf.match(/[A-ZÀÁÂÃÈÉÊÌÍÒÓÔÕÙÚÝĐ][a-zàáâãèéêìíòóôõùúýđA-ZÀÁÂÃÈÉÊÌÍÒÓÔÕÙÚÝ\s]+JSC|[A-ZÀÁÂÃÈÉÊÌÍÒÓÔÕÙÚÝĐ][a-zàáâãèéêìíòóôõùúýđA-ZÀÁÂÃÈÉÊÌÍÒÓÔÕÙÚÝ\s]+/);
    nameMap[t] = m ? m[0].trim().substring(0,18) : t;
  }
  let html = '<div class="sidebar-section">🟢 Đang giữ</div>';
  for (const t of holdings) {
    html += `<button class="ticker-btn" onclick="showTicker('${t}',this)">
      <span class="tb-code">${t}</span>
      <div><div style="font-size:12px;font-weight:600;">${nameMap[t]||t}</div></div>
      <span class="tb-badge badge-hold">GIỮ</span></button>`;
  }
  html += '<div class="sidebar-section" style="margin-top:12px;">👁️ Theo dõi</div>';
  for (const t of watchlist) {
    html += `<button class="ticker-btn" onclick="showTicker('${t}',this)">
      <span class="tb-code">${t}</span>
      <div><div style="font-size:12px;font-weight:600;">${nameMap[t]||t}</div></div>
      <span class="tb-badge badge-watch">WATCH</span></button>`;
  }
  document.querySelector('.sidebar').innerHTML = html;
}

function showTicker(ticker, btn) {
  document.querySelectorAll('.ticker-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const d = normalize(ticker, appData);
  renderMain(d);
}

function rsiColor(v) {
  const n = parseFloat(v)||50;
  return n < 30 ? 'var(--green)' : n > 70 ? 'var(--red)' : 'var(--yellow)';
}
function isMacdNeg(v) { return (v||'').toLowerCase().includes('bear') || (v||'').includes('-'); }

function renderMain(d) {
  let html = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px;">
      <h2>${d.ticker}</h2>
      <span style="margin-left:auto;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:600;" class="${d.statusClass}">${d.status}</span>
    </div>
    <div class="meta"><span style="color:var(--muted)">${d.buffett || ''}</span></div>`;

  if (d.qty !== null && d.cost) {
    const slPct = d.sl ? (((d.sl-d.cost)/d.cost)*100).toFixed(1) : '-';
    const tp1Pct = d.tp&&d.tp[0] ? (((d.tp[0]-d.cost)/d.cost)*100).toFixed(1) : '-';
    html += `<div class="info-grid">
      <div class="info-card"><div class="ic-label">Số lượng</div><div class="ic-val">${d.qty} cp</div></div>
      <div class="info-card"><div class="ic-label">Giá vốn</div><div class="ic-val" style="color:var(--accent)">${d.cost.toLocaleString()}</div></div>
      <div class="info-card"><div class="ic-label">Vốn đầu tư</div><div class="ic-val">${d.capital ? d.capital.toLocaleString()+'đ' : '-'}</div></div>
      <div class="info-card"><div class="ic-label">Ngày vào</div><div class="ic-val" style="font-size:13px">${d.entryDate||'-'}</div></div>
      <div class="info-card"><div class="ic-label">Stop-loss</div><div class="ic-val" style="color:var(--red)">${d.sl ? d.sl.toLocaleString()+' ('+slPct+'%)' : '-'}</div></div>
      <div class="info-card"><div class="ic-label">TP1</div><div class="ic-val" style="color:var(--green)">${d.tp&&d.tp[0] ? d.tp[0].toLocaleString()+' (+'+tp1Pct+'%)' : '-'}</div></div>
    </div>`;
  }

  if (d.bull.length || d.bear.length) {
    html += `<div class="section-title">Luận điểm</div>
    <div class="thesis-cols">
      <div class="thesis-block"><div class="th-title" style="color:var(--green)">✅ Bull Case</div>
        <ul>${d.bull.map(b=>`<li>🔹 ${b}</li>`).join('')}</ul></div>
      <div class="thesis-block"><div class="th-title" style="color:var(--red)">⚠️ Bear Case</div>
        <ul>${d.bear.map(b=>`<li>🔸 ${b}</li>`).join('')}</ul></div>
    </div>`;
  }

  if (d.entryPlan && d.entryPlan.length) {
    html += `<div class="section-title">Entry Plan</div>
    <div class="entry-plan"><table>
      <thead><tr><th>Điều kiện</th><th>Entry</th><th>Stop</th><th>Target</th></tr></thead>
      <tbody>${d.entryPlan.map(ep=>`<tr>
        <td style="color:var(--muted)">${ep.cond}</td>
        <td style="color:var(--accent)">${ep.entry}</td>
        <td style="color:var(--red)">${ep.sl}</td>
        <td style="color:var(--green)">${ep.target}</td></tr>`).join('')}
      </tbody></table></div>`;
  }

  html += `<div class="section-title">Lịch sử phân tích</div>
  <table><thead><tr><th>Ngày</th><th>Giá</th><th>CHG%</th><th>RSI</th><th>MACD</th><th>Điểm</th><th>Khuyến nghị</th><th>Ghi chú</th></tr></thead>
  <tbody>${d.snapshots.length ? d.snapshots.map(s=>{
    const rsiN = parseFloat(s.rsi)||50;
    const chgPos = (s.chg||'').startsWith('+');
    return `<tr>
      <td>${s.date}</td><td>${s.price}</td>
      <td style="color:${chgPos?'var(--green)':'var(--red)'}">${s.chg}</td>
      <td>${s.rsi} <span class="rsi-bar"><span class="rsi-fill" style="width:${Math.min(rsiN,100)}%;background:${rsiColor(s.rsi)};"></span></span></td>
      <td style="color:${isMacdNeg(s.macd)?'var(--red)':'var(--green)'}">${s.macd}</td>
      <td><strong>${s.score}</strong></td>
      <td><span class="rec rec-hold">${s.rec}</span></td>
      <td style="color:var(--muted);font-size:11px">${s.note}</td></tr>`;
  }).join('') : '<tr><td colspan="8" style="color:var(--muted);font-style:italic">Chưa có snapshot</td></tr>'}
  </tbody></table>`;

  html += `<div class="section-title">Lịch sử giao dịch</div>`;
  if (!d.trades.length) {
    html += `<div class="no-tx">Chưa có giao dịch nào.</div>`;
  } else {
    html += `<table><thead><tr><th>Ngày</th><th>Loại</th><th>Giá</th><th>Stop</th><th>P&L</th><th>Ghi chú</th></tr></thead>
    <tbody>${d.trades.map(t=>`<tr>
      <td>${t.date}</td>
      <td><span style="font-weight:700;color:${t.type==='MUA'?'var(--green)':'var(--red)'}">${t.type}</span></td>
      <td>${t.price}</td><td>${t.sl}</td><td>${t.pl}</td>
      <td style="color:var(--muted)">${t.note}</td></tr>`).join('')}
    </tbody></table>`;
  }

  html += `<div style="font-size:10px;color:var(--muted);margin-top:20px;text-align:right">
    Cập nhật lúc: ${appData.updated} · <a href="#" onclick="loadData()" style="color:var(--accent)">Refresh</a></div>`;

  document.getElementById('main-content').innerHTML = html;
}

function loadData() {
  fetch('data.json?t=' + Date.now())
    .then(r => r.json())
    .then(data => {
      appData = data;
      buildSidebar(data);
      const params = new URLSearchParams(location.search);
      const ticker = params.get('ticker') || (data.portfolio.holdings[0]||{}).ticker || 'VIC';
      const btn = document.querySelector('.ticker-btn');
      showTicker(ticker, btn);
      document.querySelector('.ticker-btn').classList.add('active');
    })
    .catch(e => {
      document.getElementById('main-content').innerHTML =
        `<div class="empty"><div class="em-icon">⚠️</div><div class="em-text">Không load được data.json<br><small>${e}</small></div></div>`;
    });
}

// Auto-refresh every 60s
setInterval(loadData, 60000);
loadData();
</script>
</body>
</html>
